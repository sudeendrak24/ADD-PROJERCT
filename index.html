<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRacer - Speed Typing Test</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: #12121a;
      --card-border: #1f1f2e;
      --accent: #8b5cf6;
      --accent-glow: #a78bfa;
      --teal: #14b8a6;
      --coral: #f472b6;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --correct: #22c55e;
      --wrong: #ef4444;
      --current: #8b5cf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === Animated Orb Background === */
    .orb-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: var(--teal);
      bottom: -80px; right: -80px;
      animation-delay: -3s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: var(--coral);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* === Login Page === */
    #loginPage {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .login-card.focused {
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.3), 0 25px 50px -12px rgba(0,0,0,0.5);
      border-color: var(--accent-glow);
    }
    .login-title {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.5s 0.2s both;
    }
    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-group {
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s 0.4s both;
    }
    .form-group:nth-child(2) { animation-delay: 0.5s; }
    .form-group:nth-child(3) { animation-delay: 0.6s; }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }
    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: #0a0a0f;
      border: 2px solid var(--card-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    .form-group input.shake {
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .signin-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(90deg, #f472b6, #8b5cf6, #14b8a6, #f472b6);
      background-size: 300% 100%;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.7s both;
      transition: transform 0.15s;
    }
    .signin-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .signin-btn:hover {
      transform: scale(1.02);
    }
    .signin-btn:active {
      transform: scale(0.98);
    }
    .typewriter {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      height: 1.5rem;
      animation: fadeUp 0.5s 0.8s both;
    }
    .typewriter span {
      border-right: 2px solid var(--accent);
      padding-right: 3px;
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 50% { border-color: var(--accent); }
      51%, 100% { border-color: transparent; }
    }

    /* === Typing Test Page === */
    #typingPage {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 1rem;
    }
    .typing-container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .typing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .typing-title {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .best-badge {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); }
    }
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-box {
      background: #0a0a0f;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .passage-display {
      background: #0a0a0f;
      border-radius: 12px;
      padding: 1.5rem;
      font-size: 1.15rem;
      line-height: 1.8;
      min-height: 120px;
      margin-bottom: 1.5rem;
      user-select: none;
    }
    .passage-display .word {
      display: inline-block;
      padding: 2px 4px;
      border-radius: 4px;
      margin-right: 4px;
      transition: all 0.15s;
    }
    .passage-display .word.current {
      background: var(--current);
      color: #fff;
    }
    .passage-display .word.correct {
      background: var(--correct);
      color: #fff;
    }
    .passage-display .word.wrong {
      background: var(--wrong);
      color: #fff;
      text-decoration: underline wavy 2px;
    }
    .typing-input {
      width: 100%;
      min-height: 80px;
      padding: 1rem;
      background: #0a0a0f;
      border: 2px solid var(--card-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.1rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .typing-input:focus {
      border-color: var(--accent);
    }
    .typing-input.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn {
      flex: 1;
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-secondary {
      background: var(--card-border);
      color: var(--text);
    }

    /* === Loading Spinner === */
    .loader {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loader-text {
      margin-top: 1rem;
      color: var(--text-muted);
    }

    /* === Result Modal === */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .result-modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .new-best-banner {
      background: linear-gradient(90deg, #f472b6, #8b5cf6, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s both;
    }
    .result-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .result-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .result-stat {
      background: #0a0a0f;
      border-radius: 12px;
      padding: 1rem;
    }
    .result-stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .result-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.25rem;
    }
    .modal-btn {
      padding: 0.875rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Animated Orb Background -->
  <div class="orb-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Loading Spinner -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading test...</div>
  </div>

  <!-- Login Page -->
  <div id="loginPage">
    <div class="login-card" id="loginCard">
      <h1 class="login-title">TypeRacer</h1>
      <p class="login-subtitle">Test your typing speed</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="signin-btn">Sign In</button>
      </form>
      <div class="typewriter">
        <span id="typewriterText"></span>
      </div>
    </div>
  </div>

  <!-- Typing Test Page -->
  <div id="typingPage">
    <div class="typing-container">
      <div class="typing-header">
        <h1 class="typing-title">Typing Test</h1>
        <div class="best-badge" id="bestBadge">Best: 0 WPM</div>
      </div>
      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-label">WPM</div>
          <div class="stat-value" id="wpmStat">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value" id="accuracyStat">100%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timerStat">60s</div>
        </div>
      </div>
      <div class="passage-display" id="passageDisplay"></div>
      <textarea class="typing-input" id="typingInput" placeholder="Start typing here..."></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="startBtn">Start Test</button>
        <button class="btn btn-secondary" id="restartBtn">Restart</button>
      </div>
    </div>
  </div>

  <!-- Result Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="result-modal">
      <div class="new-best-banner" id="newBestBanner" style="display:none;">🎉 New Best Score! 🎉</div>
      <h2 class="result-title">Test Results</h2>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-label">WPM</div>
          <div class="result-stat-value" id="resultWpm">0</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">Accuracy</div>
          <div class="result-stat-value" id="resultAccuracy">0%</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">Words</div>
          <div class="result-stat-value" id="resultWords">0</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-label">Errors</div>
          <div class="result-stat-value" id="resultErrors">0</div>
        </div>
      </div>
      <button class="modal-btn" id="tryAgainBtn">Try Again</button>
    </div>
  </div>

  <script>
    // === Data ===
    const passages = [
      "The quick brown fox jumps over the lazy dog.",
      "Practice makes perfect when learning to type fast.",
      "JavaScript powers interactive web experiences.",
      "A journey of a thousand miles begins with a single step.",
      "She sells seashells by the seashore every summer.",
      "Coding opens doors to endless possibilities.",
      "Speed and accuracy both matter in typing tests.",
      "The rain in Spain stays mainly in the plain.",
      "Creativity is intelligence having fun with ideas.",
      "Every expert was once a beginner."
    ];

    // === DOM Elements ===
    const loginPage = document.getElementById('loginPage');
    const typingPage = document.getElementById('typingPage');
    const loginCard = document.getElementById('loginCard');
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const loader = document.getElementById('loader');
    const passageDisplay = document.getElementById('passageDisplay');
    const typingInput = document.getElementById('typingInput');
    const wpmStat = document.getElementById('wpmStat');
    const accuracyStat = document.getElementById('accuracyStat');
    const timerStat = document.getElementById('timerStat');
    const bestBadge = document.getElementById('bestBadge');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const newBestBanner = document.getElementById('newBestBanner');
    const typeWriterText = document.getElementById('typewriterText');

    // === State ===
    let username = '';
    let passage = '';
    let passageWords = [];
    let currentWordIdx = 0;
    let timer = 60;
    let timerInterval = null;
    let started = false;
    let finished = false;
    let correctChars = 0;
    let totalTyped = 0;
    let correctWords = 0;
    let errorWords = 0;
    let bestWPM = 0;
    let startTime = null;
    let elapsed = 0;

    // === Typewriter Effect ===
    const typewriterPhrases = ["Start typing…", "Beat your best!", "Race against time!", "Type fast!", "Improve your speed!"];
    let typewriterIdx = 0;
    let typewriterTimeout = null;
    function startTypewriter() {
      typeWriterText.textContent = '';
      let charIdx = 0;
      const type = () => {
        if (charIdx <= typewriterPhrases[typewriterIdx].length) {
          typeWriterText.textContent = typewriterPhrases[typewriterIdx].slice(0, charIdx);
          charIdx++;
          typewriterTimeout = setTimeout(type, 80);
        } else {
          setTimeout(() => {
            typewriterIdx = (typewriterIdx + 1) % typewriterPhrases.length;
            startTypewriter();
          }, 2000);
        }
      };
      type();
    }
    startTypewriter();

    // === Input Focus Effects ===
    [usernameInput, emailInput].forEach(input => {
      input.addEventListener('focus', () => loginCard.classList.add('focused'));
      input.addEventListener('blur', () => loginCard.classList.remove('focused'));
    });

    // === Login Form ===
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = usernameInput.value.trim();
      const email = emailInput.value.trim();
      let valid = true;
      if (!user) {
        usernameInput.classList.add('shake');
        setTimeout(() => usernameInput.classList.remove('shake'), 500);
        valid = false;
      }
      if (!email) {
        emailInput.classList.add('shake');
        setTimeout(() => emailInput.classList.remove('shake'), 500);
        valid = false;
      }
      if (valid) {
        username = user;
        // Show loader then transition
        loader.style.display = 'flex';
        setTimeout(() => {
          loader.style.display = 'none';
          loginPage.style.display = 'none';
          typingPage.style.display = 'block';
          typingPage.style.animation = 'fadeUp 0.6s both';
          initTypingTest();
        }, 1800);
      }
    });

    // === Typing Test Functions ===
    function getBestWPM() {
      return parseInt(localStorage.getItem('typeRacerBestWPM') || '0', 10);
    }
    function setBestWPM(wpm) {
      localStorage.setItem('typeRacerBestWPM', wpm);
    }
    function pickRandomPassage() {
      return passages[Math.floor(Math.random() * passages.length)];
    }
    function renderPassage() {
      passageDisplay.innerHTML = '';
      passageWords.forEach((word, idx) => {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = word;
        span.id = 'word-' + idx;
        if (idx === currentWordIdx) span.classList.add('current');
        passageDisplay.appendChild(span);
        if (idx < passageWords.length - 1) {
          passageDisplay.appendChild(document.createTextNode(' '));
        }
      });
    }
    function updateStats() {
      const minutes = elapsed > 0 ? elapsed / 60 : 1;
      const wpm = Math.round((correctChars / 5) / minutes);
      const accuracy = totalTyped > 0 ? Math.round((correctChars / totalTyped) * 100) : 100;
      wpmStat.textContent = wpm;
      accuracyStat.textContent = accuracy + '%';
      timerStat.textContent = timer + 's';
      return { wpm, accuracy };
    }
    function highlightWord(idx, status) {
      const span = document.getElementById('word-' + idx);
      if (!span) return;
      span.classList.remove('current', 'correct', 'wrong');
      if (status) span.classList.add(status);
    }
    function initTypingTest() {
      bestWPM = getBestWPM();
      bestBadge.textContent = 'Best: ' + bestWPM + ' WPM';
      startTest();
    }
    function startTest() {
      passage = pickRandomPassage();
      passageWords = passage.split(' ');
      currentWordIdx = 0;
      timer = 60;
      elapsed = 0;
      correctChars = 0;
      totalTyped = 0;
      correctWords = 0;
      errorWords = 0;
      started = false;
      finished = false;
      typingInput.value = '';
      typingInput.disabled = false;
      typingInput.classList.remove('disabled');
      typingInput.placeholder = 'Start typing here...';
      typingInput.focus();
      renderPassage();
      updateStats();
      clearInterval(timerInterval);
      timerStat.textContent = '60s';
    }
    function endTest() {
      finished = true;
      typingInput.disabled = true;
      typingInput.classList.add('disabled');
      clearInterval(timerInterval);
      const { wpm, accuracy } = updateStats();
      const isNewBest = wpm > bestWPM;
      if (isNewBest) {
        setBestWPM(wpm);
        bestWPM = wpm;
        bestBadge.textContent = 'Best: ' + wpm + ' WPM';
      }
      // Show modal
      document.getElementById('resultWpm').textContent = wpm;
      document.getElementById('resultAccuracy').textContent = accuracy + '%';
      document.getElementById('resultWords').textContent = passageWords.length;
      document.getElementById('resultErrors').textContent = errorWords;
      newBestBanner.style.display = isNewBest ? 'block' : 'none';
      modalBackdrop.style.display = 'flex';
    }
    function restartTest() {
      modalBackdrop.style.display = 'none';
      startTest();
    }
    function handleInput() {
      if (finished) return;
      if (!started) {
        started = true;
        startTime = Date.now();
        timerInterval = setInterval(() => {
          elapsed = Math.floor((Date.now() - startTime) / 1000);
          timer = 60 - elapsed;
          updateStats();
          if (timer <= 0) {
            timer = 0;
            endTest();
          }
        }, 1000);
      }
      const input = typingInput.value;
      const typedWords = input.trim().split(/\s+/).filter(w => w);
      totalTyped = input.length;
      correctChars = 0;
      correctWords = 0;
      errorWords = 0;
      // Calculate correct chars
      for (let i = 0; i < Math.min(input.length, passage.length); i++) {
        if (input[i] === passage[i]) correctChars++;
      }
      // Word highlighting
      passageWords.forEach((word, idx) => {
        const typedWord = typedWords[idx];
        highlightWord(idx, null);
        if (typedWord !== undefined) {
          if (typedWord === word) {
            highlightWord(idx, 'correct');
            correctWords++;
          } else {
            highlightWord(idx, 'wrong');
            errorWords++;
          }
        } else if (idx === typedWords.length) {
          highlightWord(idx, 'current');
        }
      });
      updateStats();
      // Check completion
      if (input.trim() === passage) {
        endTest();
      }
    }

    // === Event Listeners ===
    startBtn.addEventListener('click', startTest);
    restartBtn.addEventListener('click', restartTest);
    typingInput.addEventListener('input', handleInput);
    document.getElementById('tryAgainBtn').addEventListener('click', restartTest);
  </script>
</body>
</html>
